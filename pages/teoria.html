<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OMNIS - Teoria</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/teoria.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">
      <a href="../index.html"><img src="../assets/images/logo.png" alt="OMNIS Logo" class="logo-img" /></a>
    </div>
    <ul class="nav-links">
      <li><a href="jogos.html">Jogos</a></li>
      <li><a href="experimentos.html">Experimentos</a></li>
      <li><a href="teoria.html" class="ativo">Teoria</a></li>
      <li><a href="comunidade.html">Comunidade</a></li>
    </ul>
    <div class="nav-buttons">
      <a href="#" class="btn-login">Entrar</a>
      <a href="#" class="btn-cadastro">Cadastrar</a>
    </div>
    <div class="nav-hamburger" onclick="toggleMenu()" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <!-- Menu mobile -->
  <div class="nav-mobile-menu" id="mobileMenu">
    <a href="jogos.html">🎮 Jogos</a>
    <a href="experimentos.html">🔬 Experimentos</a>
    <a href="teoria.html">📚 Teoria</a>
    <a href="comunidade.html">🌐 Comunidade</a>
    <div class="mobile-btns">
      <a href="#" class="btn-login">Entrar</a>
      <a href="#" class="btn-cadastro">Cadastrar</a>
    </div>
  </div>

  <!-- HEADER -->
  <section class="teoria-header">
    <h1>📚 Teoria</h1>
    <p>Escolha uma matéria e explore os conteúdos</p>
  </section>

  <!-- ABAS E CARDS — gerados via JS -->
  <section class="teoria-container">
    <!-- Tabs das matérias -->
    <div class="materias-tabs" id="materiasTabs">
      <div class="tab-loading">Carregando matérias...</div>
    </div>
    <!-- Cards dos tópicos -->
    <div id="topicosContainer"></div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <img src="../assets/images/logo.png" alt="OMNIS" class="footer-logo" />
    <p>© 2025 OMNIS - Integrated Educational Platform. Todos os direitos reservados.</p>
  </footer>

  <script src="../assets/js/script.js"></script>
  <script src="../assets/js/teoria.js"></script>
  <script>
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('aberto');
    }
    document.querySelectorAll('.nav-mobile-menu a, .nav-links a').forEach(link => {
      link.addEventListener('click', function(e) {
        document.getElementById('mobileMenu').classList.remove('aberto');
        const href = this.getAttribute('href');
        if (href && href !== '#') {
          e.preventDefault();
          document.body.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          document.body.style.opacity = '0';
          document.body.style.transform = 'translateY(-20px)';
          setTimeout(() => { window.location.href = href; }, 400);
        }
      });
    });
  </script>
</body>
</html>
